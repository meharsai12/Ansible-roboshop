- name: Configuring catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: Disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: Enabled required nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install
    ansible.builtin.package:
      name: nodejs
      state: present


  - name: Setting system user
    ansible.builtin.user:
      name: roboshop 
      shell: /sbin/nologin
      system: true
      home: /app

  - name:  creating app directory
    ansible.builtin.file:
      path: /app
      state: directory


  - name: download application code 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip
     

   
  - name: unzipping catalogue code
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes
  

  - name: install dependencies
    ansible.builtin.npm:
      path: /app

  - name: copy system service
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service


  - name: DAemon-reload 
    ansible.builtin.systemd_service:
         daemon_reload: true


  - name: start and enable the service
    ansible.builtin.service:
      name: catalogue
      state: started
      enabled: yes

  - name: copy mongo repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo


  - name: install mongodb client
    ansible.builtin.package:
      name: mongodb-mongosh
      state: installed


  - name: check products loaded or not
    ansible.builtin.command: mongosh --host mongodb.mehar.fun --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: print catalogue output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: load products
    ansible.builtin.shell: mongosh --host mongodb.mehar.fun < /app/db/master-data.js
    when: catalogue_output.stdout | int < 0




  
      
